<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-app">
  <main class="auth-wrapper">
    <div class="card auth-card rounded-4 overflow-hidden">
      <div class="card-body p-4 p-sm-5">
        <div class="d-flex align-items-center gap-3 mb-4">
          <div class="brand-badge">A</div>
          <div>
            <h1 class="h4 mb-0">Chào mừng trở lại</h1>
            <small class="text-secondary">Đăng nhập để tiếp tục</small>
          </div>
        </div>

        <form id="loginForm" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" placeholder="admin" required />
              <div class="invalid-feedback">Vui lòng nhập tên đăng nhập.</div>
            </div>
          </div>

          <div class="mb-2">
            <label for="password" class="form-label">Mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="••••••••" minlength="6" required />
              <button class="btn btn-outline-light" type="button" id="togglePw" aria-label="Hiện/ẩn mật khẩu"><i class="bi bi-eye"></i></button>
              <div class="invalid-feedback">Mật khẩu tối thiểu 6 ký tự.</div>
            </div>
            <small id="capsHint" class="caps-hint text-warning"><i class="bi bi-exclamation-triangle me-1"></i>Caps Lock đang bật</small>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-2 mb-4 helper-links">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember" />
              <label class="form-check-label" for="remember">Ghi nhớ tôi</label>
            </div>
            <a href="#" onclick="event.preventDefault(); alert('Liên kết quên mật khẩu (demo)');">Quên mật khẩu?</a>
          </div>

          <button class="btn btn-brand w-100 btn-lg" id="submitBtn" type="submit">
            <span class="btn-label">Đăng nhập</span>
            <span class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
          </button>
        </form>

        <div class="divider my-4">hoặc</div>

        <div class="d-grid gap-2">
          <button class="btn btn-outline-light" type="button"><i class="bi bi-google me-2"></i>Đăng nhập với Google</button>
          <button class="btn btn-outline-light" type="button"><i class="bi bi-github me-2"></i>Đăng nhập với GitHub</button>
        </div>

        <p class="mt-4 mb-0 text-center text-secondary">Chưa có tài khoản? <a class="text-light" href="#" onclick="event.preventDefault(); alert('Liên kết đăng ký (demo)');">Đăng ký</a></p>
      </div>
    </div>
  </main>

  <!-- Toast notifications -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080">
    <div id="liveToast" class="toast text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">Thông báo</strong>
        <small>vừa xong</small>
        <button type="button" class="btn-close btn-close-white ms-2 mb-1" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toastBody">Đăng nhập thành công!</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
